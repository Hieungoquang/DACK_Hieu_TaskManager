name: task_manager
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  icalendar_parser: ^2.0.0
  syncfusion_flutter_calendar: ^31.2.18
  
  # State management
  provider: ^6.1.2

  # Hive (database offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.5
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  flutter_quill: ^9.2.3
  flutter_quill_extensions: ^9.2.3

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  cupertino_icons: ^1.0.8
  uuid: ^4.4.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  table_calendar: ^3.1.2
  fl_chart: ^0.66.0
  http: ^1.2.1
  flutter_speed_dial: ^7.0.0
  image_picker: ^1.2.2
  firebase_storage: ^11.7.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code generators
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

dependency_overrides:
  timezone: ^0.9.2

flutter:
  uses-material-design: true
